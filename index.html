    to   { opacity:1; transform:translateY(0); }
  }
  .card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;

  .card::after {

  .chip {

  .table-wrap {

  table { width:100%; border-collapse:collapse; }

  thead th {
    padding:.7rem .85rem;
    font-family:'Syne',sans-serif; font-weight:700;

  }
  @media(max-width:600px) {
    .hide-xs { display:none !important; }
  }

  <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.557 4.126 1.526 5.858L.057 23.486a.75.75 0 0 0 .921.921l5.63-1.469A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.9 0-3.686-.498-5.23-1.367l-.376-.215-3.898 1.017 1.018-3.898-.215-.376A9.945 9.945 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
</svg>`;

// ── JEFES/AS SECTION ──────────────────────────────────────────────────────────
function buildJefes(){
  const sec=document.getElementById('jefesSection');
  sec.innerHTML=`<div class="jefes-label">Jefes/as de Recinto</div><div class="jefes-grid" id="jefesGrid"></div>`;
  const grid=document.getElementById('jefesGrid');
  Object.entries(RECINTOS_CFG).forEach(([name,cfg])=>{
    const cnt=DATA.filter(d=>d.r===name).length;
    const isA=activeRecinto===name;
    const card=document.createElement('div');
    card.className='jefe-card'+(isA?' active':'');
    card.style.setProperty('--jc',cfg.color);
    card.innerHTML=`
      <div class="jefe-avatar" style="background:${cfg.color};box-shadow:0 0 10px ${cfg.color}40;color:#fff">${cfg.initial}</div>
      <div class="jefe-info">
        <div class="jefe-nombre">${name}</div>
        <div class="jefe-rol">${cfg.role}</div>
      </div>
      <div class="jefe-cnt">${cnt}</div>`;
    card.onclick=()=>{activeRecinto=activeRecinto===name?null:name;buildJefes();render();};
    grid.appendChild(card);
  });
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function getFiltered(){
  return DATA
    .filter(d=>{
      const q=searchQuery.toLowerCase().trim();
      // Busca en nombre, apellido, ci, tel, mesa Y nombre del jefe/a de recinto
      const match=!q||[d.n,d.a,d.ci,d.tel,d.m,d.r].some(v=>v.toLowerCase().includes(q));
      return match&&(!activeRecinto||d.r===activeRecinto);
    })
    .sort((a,b)=>sortAsc?parseInt(a.m)-parseInt(b.m):parseInt(b.m)-parseInt(a.m));
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const f=getFiltered();
  document.getElementById('resultCount').textContent=f.length;
  document.getElementById('fbCount').textContent=f.length;
  document.getElementById('fbRecinto').textContent=activeRecinto||'Todos los recintos';
  const hf=searchQuery||activeRecinto;
  document.getElementById('clearBtn').className='clear-btn'+(hf?' show':'');
  const main=document.getElementById('mainContent');
  if(!f.length){
    main.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><strong>Sin resultados</strong>Intenta con otro nombre o término</div>';
    return;
  }
  currentView==='card'?renderCards(f,main):renderTable(f,main);
}

function renderCards(f,container){
  const grps={};
  f.forEach(d=>{if(!grps[d.r])grps[d.r]=[];grps[d.r].push(d);});
  container.innerHTML='';
  let gi=0;
  Object.entries(RECINTOS_CFG).forEach(([rec,cfg])=>{
    if(!grps[rec])return;
    const items=grps[rec];
    const sec=document.createElement('div');
    sec.className='recinto-group';
    sec.innerHTML=`
      <div class="recinto-header" style="--c:${cfg.color};border-left-color:${cfg.color}">
        <div class="recinto-avatar" style="background:${cfg.color}30;border:1.5px solid ${cfg.color};box-shadow:0 0 8px ${cfg.color}50">${cfg.initial}</div>
        <div class="recinto-info">
          <div class="recinto-name">${rec}</div>
          <div class="recinto-role" style="color:${cfg.color}">${cfg.role}</div>
        </div>
        <div class="recinto-badge" style="color:${cfg.color};border-color:${cfg.color}">${items.length}</div>
      </div>`;
    const grid=document.createElement('div');
    grid.className='cards-grid';
    items.forEach((d,i)=>{
      gi++;
      const card=document.createElement('div');
      card.className='card';
      card.style.cssText=`--c:${cfg.color};animation-delay:${i*30}ms`;
      card.innerHTML=`
        <div class="card-top">
          <div><div class="card-mesa">${d.m}</div><div class="card-mesa-lbl">Mesa</div></div>
          <div class="card-idx">#${gi}</div>
        </div>
        <div class="card-name">${d.n}</div>
        <div class="card-apellido">${d.a}</div>
        <div class="card-chips">
          <span class="chip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>${d.ci}
          </span>
          <a class="chip chip-wa" href="${waLink(d.tel)}" target="_blank" rel="noopener">
            ${WA_SVG}${d.tel}
          </a>
        </div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    container.appendChild(sec);
  });
}

function renderTable(f,container){
  container.innerHTML=`
    <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Mesa</th><th>Nombre</th><th>Apellidos</th>
        <th class="hide-xs">C.I.</th><th>Llamar</th><th>Jefe/a Recinto</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table></div>`;
  const tb=document.getElementById('tbody');
  f.forEach((d,i)=>{
    const cfg=RECINTOS_CFG[d.r];
    const tr=document.createElement('tr');
    tr.style.animationDelay=`${i*16}ms`;
    tr.innerHTML=`
      <td class="td-muted">${i+1}</td>
      <td class="td-mesa" style="color:${cfg.color}">${d.m}</td>
      <td class="td-name">${d.n}</td>
      <td>${d.a}</td>
      <td class="td-muted hide-xs">${d.ci}</td>
      <td>
        <a class="td-wa" href="${waLink(d.tel)}" target="_blank" rel="noopener">
          ${WA_SVG}${d.tel}
        </a>
      </td>
      <td><span class="td-dot" style="background:${cfg.color}"></span>${d.r}</td>`;
    tb.appendChild(tr);
  });
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function setView(v){
  currentView=v;
  document.getElementById('btnCard').className='view-btn'+(v==='card'?' active':'');
  document.getElementById('btnTable').className='view-btn'+(v==='table'?' active':'');
  render();
}
function toggleSort(){
  sortAsc=!sortAsc;
  document.getElementById('sortLabel').textContent=`Mesa ${sortAsc?'↑':'↓'}`;
  render();
}
function clearFilters(){
  searchQuery=''; activeRecinto=null;
  document.getElementById('searchInput').value='';
  buildJefes(); render();
}
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value;
  // Al escribir, la búsqueda es global: limpia el filtro de recinto activo
  if(searchQuery){ activeRecinto=null; buildJefes(); }
  render();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
buildJefes();
render();
</script>
</body>
</html>
